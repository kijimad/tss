<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruby VM (YARV) シミュレータ</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #cc342d;
      border-bottom: 2px solid #cc342d;
      padding-bottom: 10px;
    }
    h2, h3 {
      color: #e0e0e0;
    }
    textarea {
      width: 100%;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 14px;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 4px;
    }
    button {
      padding: 8px 20px;
      margin: 8px 4px;
      background: #cc342d;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #e04040;
    }
    .output-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .panel {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 12px;
    }
    .panel pre {
      max-height: 300px;
      overflow: auto;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { initApp } from './src/ui/app.ts';
    initApp();
  </script>
</body>
</html>
