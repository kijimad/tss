<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECS Simulator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; }
      #app { max-width: 1200px; margin: 0 auto; padding: 20px; }
      h1 { color: #58a6ff; margin-bottom: 20px; }
      h2 { color: #8b949e; margin: 16px 0 8px; font-size: 1.1em; }
      .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
      .metric { display: inline-block; margin-right: 24px; }
      .metric-value { font-size: 1.5em; color: #58a6ff; font-weight: bold; }
      .metric-label { font-size: 0.85em; color: #8b949e; }
      table { width: 100%; border-collapse: collapse; margin-top: 8px; }
      th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; }
      th { color: #8b949e; font-weight: 600; }
      .status-running { color: #3fb950; }
      .status-pending { color: #d29922; }
      .status-stopped { color: #f85149; }
      .btn { background: #238636; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; margin-right: 8px; }
      .btn:hover { background: #2ea043; }
      .btn-danger { background: #da3633; }
      .btn-danger:hover { background: #f85149; }
      .logs { background: #0d1117; border: 1px solid #30363d; padding: 12px; font-family: monospace; font-size: 0.85em; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
      .event { padding: 4px 0; border-bottom: 1px solid #21262d; font-size: 0.9em; }
      .progress-bar { background: #21262d; border-radius: 4px; height: 8px; margin-top: 4px; }
      .progress-fill { background: #238636; height: 100%; border-radius: 4px; transition: width 0.3s; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/ui/app.ts"></script>
  </body>
</html>
