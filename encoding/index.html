<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encoding Simulator</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Consolas", "Monaco", monospace; background: #0a0a0a; color: #e0e0e0; padding: 20px; }
      h1 { color: #00e5ff; margin-bottom: 16px; }
      h2 { color: #76ff03; margin: 16px 0 8px; font-size: 1.1em; }
      .section { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
      input, select, button { font-family: inherit; font-size: 14px; padding: 8px 12px; border-radius: 4px; border: 1px solid #444; background: #222; color: #e0e0e0; }
      button { background: #00695c; cursor: pointer; }
      button:hover { background: #00897b; }
      .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
      .controls input[type="text"] { flex: 1; min-width: 200px; }
      table { border-collapse: collapse; width: 100%; font-size: 13px; }
      th, td { border: 1px solid #333; padding: 4px 8px; text-align: center; }
      th { background: #1a237e; }
      .hex { color: #ffab40; }
      .bin { color: #80deea; }
      .header-bit { color: #ff5252; font-weight: bold; }
      .payload-bit { color: #69f0ae; }
      .mojibake { color: #ff1744; }
      #output { white-space: pre-wrap; }
      .ascii-table { font-size: 12px; max-height: 400px; overflow-y: auto; }
      .comparison-table td { text-align: left; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Encoding Simulator</h1>
    <div id="app"></div>
    <script type="module" src="/src/ui/app.ts"></script>
  </body>
</html>
