x-app: &app
  image: node:22-slim
  working_dir: /app
  command: sh -c "npm install && CHOKIDAR_USEPOLLING=true npm run dev -- --host 0.0.0.0"

services:
  portal:
    image: node:22-slim
    working_dir: /app
    command: npx serve -l 3000 .
    volumes:
      - ./index.html:/app/index.html:ro
    ports:
      - "3000:3000"

  bios:
    <<: *app
    volumes: [./bios:/app]
    ports: ["5501:5173"]

