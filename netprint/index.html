<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ネットワークプリンタ シミュレーター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #e0e0e0; font-family: 'Menlo','Consolas',monospace; font-size: 13px; }
    #app { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h3 { font-size: 13px; color: #7dd3fc; margin-bottom: 8px; border-bottom: 1px solid #1e1e3e; padding-bottom: 4px; }
    .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .controls label { color: #aaa; font-size: 12px; }
    select, button { background: #111128; color: #e0e0e0; border: 1px solid #2a2a4a; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 12px; }
    select:hover, button:hover { border-color: #00d4ff; }
    button:disabled { opacity: .4; cursor: default; }
    input[type="range"] { width: 100px; }
    .desc { color: #888; font-size: 11px; }
    .step-info { color: #7dd3fc; font-size: 12px; margin-left: 8px; }
    .panels { display: grid; gap: 10px; margin-bottom: 10px; }
    .top { grid-template-columns: 1fr 1fr; }
    .mid { grid-template-columns: 1fr 1fr; }
    .bot { grid-template-columns: 1fr; }
    .panel { background: #0d0d20; border: 1px solid #1e1e3e; border-radius: 6px; padding: 10px; max-height: 360px; overflow-y: auto; }
    .empty { color: #555; font-style: italic; font-size: 11px; }

    /* プリンタカード */
    .printer-card { background: #111128; border: 1px solid #1e1e3e; border-radius: 4px; padding: 8px; margin-bottom: 6px; }
    .printer-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .printer-name { font-weight: bold; color: #c4b5fd; font-size: 14px; }
    .printer-state { font-size: 11px; padding: 1px 6px; border-radius: 3px; }
    .state-idle { background: #0a2a1a; color: #4ade80; }
    .state-printing { background: #0a1a2a; color: #22d3ee; }
    .state-warming_up { background: #2a1a0a; color: #fb923c; }
    .state-error { background: #2a0a0a; color: #f87171; }
    .state-offline { background: #1a1a1a; color: #666; }
    .state-paper_jam { background: #2a0a0a; color: #ef4444; }
    .state-toner_low { background: #2a2a0a; color: #facc15; }
    .state-sleep { background: #0a0a2a; color: #818cf8; }
    .printer-detail { font-size: 11px; color: #aaa; line-height: 1.7; }
    .printer-detail strong { color: #e0e0e0; }
    .toner-bar { position: relative; height: 14px; background: #1a1a2a; border-radius: 3px; margin-top: 3px; overflow: hidden; }
    .toner-label { position: absolute; z-index: 1; left: 4px; top: 0; font-size: 10px; line-height: 14px; color: #fff; text-shadow: 0 0 2px #000; }
    .toner-fill { display: block; height: 100%; border-radius: 3px; transition: width .3s; }
    .cur-job { color: #22d3ee; margin-top: 2px; }
    .err-msg { color: #f87171; font-weight: bold; margin-top: 2px; }

    /* パケット */
    .pkt { font-size: 11px; padding: 4px 6px; margin-bottom: 3px; border-radius: 3px; background: #0d0d20; border: 1px solid #1e1e3e; }
    .pkt-dir { color: #a78bfa; }
    .pkt-proto { color: #22d3ee; margin-left: 6px; font-size: 10px; }
    .pkt-type { color: #facc15; margin-left: 6px; font-size: 10px; }
    .pkt-payload { color: #666; font-size: 10px; margin-top: 1px; }
    .pkt-discovery { border-left: 3px solid #a78bfa; }
    .pkt-job_submit { border-left: 3px solid #22d3ee; }
    .pkt-data_transfer { border-left: 3px solid #4ade80; }
    .pkt-status_query { border-left: 3px solid #facc15; }
    .pkt-status_response { border-left: 3px solid #fb923c; }
    .pkt-ack { border-left: 3px solid #34d399; }
    .pkt-error { border-left: 3px solid #f87171; }

    /* ジョブ */
    .job-card { padding: 6px 8px; margin-bottom: 4px; border-radius: 4px; border: 1px solid #1e1e3e; }
    .job-header { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .job-id { font-weight: bold; color: #facc15; }
    .job-name { color: #c4b5fd; }
    .job-state { font-size: 10px; padding: 1px 5px; border-radius: 2px; }
    .job-detail { font-size: 10px; color: #888; margin-top: 2px; line-height: 1.6; }
    .job-queued { background: #0d0d20; border-left: 3px solid #818cf8; }
    .job-transferring { background: #0a1a2a; border-left: 3px solid #22d3ee; }
    .job-processing { background: #0a2a1a; border-left: 3px solid #4ade80; }
    .job-printing { background: #0a1a2a; border-left: 3px solid #06b6d4; }
    .job-completed { background: #1a1a1a; border-left: 3px solid #555; color: #666; }
    .job-cancelled { background: #1a1a1a; border-left: 3px solid #f87171; color: #888; }
    .job-error { background: #2a0a0a; border-left: 3px solid #ef4444; }

    /* イベント */
    .ev { font-size: 11px; padding: 2px 4px; margin-bottom: 2px; border-radius: 2px; }
    .ev-detail { font-size: 10px; color: #666; margin-top: 1px; padding-left: 8px; }
    .ev-discovery { color: #a78bfa; }
    .ev-connect { color: #60a5fa; }
    .ev-submit { color: #22d3ee; }
    .ev-transfer { color: #4ade80; }
    .ev-process { color: #34d399; }
    .ev-print_start { color: #06b6d4; font-weight: bold; }
    .ev-print_page { color: #7dd3fc; }
    .ev-print_done { color: #4ade80; font-weight: bold; }
    .ev-status { color: #888; }
    .ev-error { color: #f87171; font-weight: bold; }
    .ev-paper_jam { color: #ef4444; font-weight: bold; }
    .ev-toner_low { color: #facc15; }
    .ev-paper_out { color: #fb923c; font-weight: bold; }
    .ev-warmup { color: #fb923c; }
    .ev-cancel { color: #f472b6; }
    .ev-queue { color: #818cf8; }
    .ev-network { color: #60a5fa; }
    .ev-comment { color: #555; font-style: italic; }

    .log { font-size: 11px; color: #888; padding: 1px 4px; white-space: nowrap; }
    .log-cur { color: #e0e0e0; background: #14143a; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/ui/app.ts"></script>
</body>
</html>
