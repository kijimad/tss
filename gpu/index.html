<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPU Simulator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #e0e0e0; padding: 16px; }
      h1 { color: #76b900; margin-bottom: 12px; }
      h2 { color: #76b900; margin: 12px 0 8px; font-size: 1.1em; }
      .panel { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      table { width: 100%; border-collapse: collapse; }
      td, th { padding: 4px 8px; text-align: left; border-bottom: 1px solid #333; }
      th { color: #76b900; }
      button { background: #76b900; color: #000; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; margin: 4px; font-weight: bold; }
      button:hover { background: #8cd100; }
      canvas { border: 1px solid #444; background: #000; display: block; margin-top: 8px; }
      pre { background: #111; padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 0.85em; max-height: 300px; overflow-y: auto; }
      .mem-bar { height: 18px; border-radius: 3px; margin: 2px 0; }
      .sm-block { display: inline-block; width: 12px; height: 12px; margin: 1px; border-radius: 2px; }
      .active { background: #76b900; }
      .inactive { background: #333; }
      .diverged { background: #ff6600; }
    </style>
  </head>
  <body>
    <h1>GPU Simulator</h1>
    <div id="app"></div>
    <script type="module" src="/src/ui/app.ts"></script>
  </body>
</html>
