<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIX 擬似端末 (PTY) シミュレーター</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #e0e0e0; font-family: 'Menlo','Consolas',monospace; font-size: 13px; }
    #app { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h3 { font-size: 13px; color: #7dd3fc; margin-bottom: 8px; border-bottom: 1px solid #1e1e3e; padding-bottom: 4px; }
    .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .controls label { color: #aaa; font-size: 12px; }
    select, button { background: #111128; color: #e0e0e0; border: 1px solid #2a2a4a; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 12px; }
    select:hover, button:hover { border-color: #00d4ff; }
    button:disabled { opacity: .4; cursor: default; }
    input[type="range"] { width: 100px; }
    .desc { color: #888; font-size: 11px; }
    .step-info { color: #7dd3fc; font-size: 12px; margin-left: 8px; }
    .panels { display: grid; gap: 10px; margin-bottom: 10px; }
    .top { grid-template-columns: 1fr 1fr; }
    .mid { grid-template-columns: 1fr 1fr; }
    .bot { grid-template-columns: 1fr; }
    .panel { background: #0d0d20; border: 1px solid #1e1e3e; border-radius: 6px; padding: 10px; max-height: 320px; overflow-y: auto; }
    .empty { color: #555; font-style: italic; font-size: 11px; }

    .pty-card { background: #111128; border: 1px solid #1e1e3e; border-radius: 4px; padding: 8px; margin-bottom: 6px; }
    .pty-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .pty-id { font-weight: bold; color: #f472b6; font-size: 14px; }
    .pty-state { font-size: 11px; padding: 1px 6px; border-radius: 3px; }
    .state-allocated { background: #2a1a0a; color: #fb923c; }
    .state-granted { background: #1a2a0a; color: #a3e635; }
    .state-unlocked { background: #0a2a1a; color: #34d399; }
    .state-open { background: #0a1a2a; color: #22d3ee; }
    .state-closed { background: #1a1a1a; color: #666; }
    .pty-detail { font-size: 11px; color: #aaa; line-height: 1.6; }
    .pty-detail strong { color: #e0e0e0; }
    .pty-buf { display: flex; gap: 12px; margin-top: 4px; color: #666; font-size: 10px; }

    .flow-item { background: #0d0d20; border: 1px solid #1e1e3e; border-radius: 4px; padding: 6px 8px; margin-bottom: 4px; }
    .flow-ms { border-left: 3px solid #22d3ee; }
    .flow-sm { border-left: 3px solid #a78bfa; }
    .flow-dir { font-size: 12px; font-weight: bold; color: #facc15; }
    .flow-path { font-size: 11px; color: #888; margin: 2px 0; }
    .flow-data { font-size: 11px; color: #4ade80; }

    .proc { padding: 6px 8px; margin-bottom: 4px; border-radius: 4px; }
    .p-run { background: #0a2a0a; border-left: 3px solid #4ade80; }
    .p-stop { background: #2a2a0a; border-left: 3px solid #facc15; }
    .p-term { background: #1a1a1a; border-left: 3px solid #555; color: #666; }
    .proc-head { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .proc-pid { font-weight: bold; color: #facc15; }
    .proc-name { color: #c4b5fd; }
    .proc-info { font-size: 10px; color: #666; }
    .proc-ctty { font-size: 10px; color: #06b6d4; }
    .proc-fds { margin-top: 3px; display: flex; flex-wrap: wrap; gap: 3px; }
    .fd-badge { font-size: 10px; background: #0a1a2a; color: #22d3ee; padding: 1px 5px; border-radius: 2px; }

    .ev { font-size: 11px; padding: 2px 4px; margin-bottom: 2px; border-radius: 2px; }
    .ev-detail { font-size: 10px; color: #666; margin-top: 1px; padding-left: 8px; }
    .ev-pty_alloc { color: #fb923c; }
    .ev-pty_grant { color: #a3e635; }
    .ev-pty_unlock { color: #34d399; }
    .ev-pty_open { color: #22d3ee; }
    .ev-pty_close { color: #f87171; }
    .ev-data_flow { color: #a78bfa; }
    .ev-session, .ev-setsid { color: #facc15; }
    .ev-ctty { color: #f472b6; }
    .ev-signal { color: #ef4444; font-weight: bold; }
    .ev-winsize { color: #06b6d4; }
    .ev-fork, .ev-exec { color: #60a5fa; }
    .ev-ioctl { color: #888; }
    .ev-comment { color: #555; font-style: italic; }

    .log { font-size: 11px; color: #888; padding: 1px 4px; white-space: nowrap; }
    .log-cur { color: #e0e0e0; background: #14143a; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/ui/app.ts"></script>
</body>
</html>
